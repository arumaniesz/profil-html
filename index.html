<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Siswa</title>
    <!-- Font Awesome -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap">

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Puppins', sans-serif;
      }
      body{
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        overflow:hidden;
        background:linear-gradient(-45deg, #87CEEB, #4FC3F7, #29B6F6, #03A9F4);
        background-size:400% 400%;
        animation:bg 10s ease infinite;
        padding:20px;
      }
      /* Animasi Background */
      @keyframes bg{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
      }
      /* Header */
      header{
        margin-bottom:25px;
        text-align:center;
        animation:fadeDown 1s ease;
      }
      header h1{
        font-family:'Cinzel', serif;
        font-size:40px;
        font-weight:700;
        letter-spacing:3px;
        text-transform:uppercase;
        
        background:linear-gradient{
          180deg
          #fff7c2 0%,
          #ffd700 30%,
          #ffb300 60%,
          #fff4b0 100%
        };
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        
        text-shadow:
          0 0 5px rgba(255,215,0,0.8),
          0 0 10px rgba(255,215,0,0.7),
          0 0 20px rgba(255,193,7,0.6),
          0 0 35px rgba(255,152,0,0.5);
        
        animation:mythicGlow 2s ease-in-out infinite alternate;
      }
      
      header p{
        color:#fff;
        margin-top:8px;
        font-size:15px;
        letter-spacing:1px;
      }
      @keyframes mythicGlow{
        from{
          filter:drop-shadow(0 0 5px gold);
        }
        to{
          filter:drop-shadow(0 0 20px gold);
        }
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
      /* Efek Blink */
      @keyframes blink{
        0%, 100%{
          box-shadow:
            0 0 10px #fff,
            0 0 20px #81D4FA,
            0 0 40px #29B6F6;
        }
        50%{
          box-shadow:
            0 0 5px #fff,
            0 0 10px #81D4FA,
            0 0 20px #29B6F6;
        }
      }
      /* Card */
      .card{
        width:380px;
        padding:30px;
        border-radius:25px;
        text-align:center;
        color:white;
        background:rgba(255,255,255,0.12);
        backdrop-filter:blur(12px);
        border:2px solid rgba(255,255,255,0.2);
        animation:blink 1.5s infinite;
      }
      /* Foto */
      .profile-img{
        width:130px;
        height:130px;
        border-radius:50%;
        border:4px solid white;
        object-fit:cover;
        margin-bottom:15px;
      }
      /* Nama */
      .card h2{
        font-family:'Cinzel', serif;
        font-size:28px;
        letter-spacing:2px;

        background:linear-gradient(
          180deg,
          #fff8dc,
          #ffd700,
          #ffb300
        );

        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;

        text-shadow:
          0 0 5px #ffd700,
          0 0 10px #ffcc00,
          0 0 20px #ffb300;
      }

      /* Deskripsi */
      .desc{
        font-size:15px;
        line-height:1.8;
        margin-top:10px;
        color:#fff;
      }
      /* Qoute */
      .qoute{
        margin-top:20px;
        font-style:italic;
        font-size:14px;
        color:#ffe6f5;
      }
      /* Sosial Media */
      .social{
        margin-top:25px;
      }

      .social a{
        text-decoration:none;
        color:white;
        font-size:28px;
        margin:0 12px;
        transition:0.3s;
      }

      .social a:hover{
        color:#ffe4f2;
        transform:scale(1.2);
      }

        
    </style>
  </head>

  <body>

    <!-- HEADER -->
    <header>
      <h1>Profile Diri Siswa</h1>
      <p>✨ Kreatif • Cerdas • Coding ✨</p>
    </header>

    <!-- CARD -->
    <div class="card">

      <!-- Foto -->
      <img src="ftoarwm.jpeg"
      alt="Foto Profil"
      class="profile-img">
      <!-- Nama -->
      <h2>ARUM BUNGA ROSHEILA</h2>

      <!-- Deskripsi -->
      <div class="desc">
        <p><b>Kelas:</b> X-A Keperawatan & Caregiver</p>
        <p><b>Sekolah:</b> SMKS Kesehatan Yannas Husada Bangkalan</p>
        <p><b>Hobi:</b> Badminton</p>
      </div>
      <!-- Quote -->
      <div class="quote">
        "Hidup adalah perjuangan, tetapi setiap langkah membawamu lebih dekat ke tujuan"
      </div>
      <!-- Sosial Media -->
      <div class="social">
        <a href="#" title="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
        <a href="#" title="Tiktok">
          <i class="fab fa-tiktok"></i>
        </a>
        <a href="#" title="WhatsApp">
          <i class="fab fa-whatsapp"></i>
        </a>
        <a href="#" title="Github">
          <i class="fab fa-github"></i>
        </a>
      </div>
    </div>
  </body>
</html>
